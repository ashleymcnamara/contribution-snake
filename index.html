<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Contribution Snake — play snake on any GitHub contribution graph</title>
  <meta name="description" content="A snake game themed around the GitHub contribution graph. Play your real contributions, race the daily challenge, and climb the leaderboard.">
  <meta name="theme-color" content="#0d1117">
  <meta name="color-scheme" content="dark light">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contribution Snake">
  <meta property="og:description" content="A snake game themed around the GitHub contribution graph. Play your real contributions, race the daily challenge, and climb the leaderboard.">
  <meta property="og:url" content="https://yetanothersnake.dev/">
  <meta property="og:image" content="https://yetanothersnake.dev/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contribution Snake">
  <meta name="twitter:description" content="A snake game themed around the GitHub contribution graph. Play your real contributions, race the daily challenge, and climb the leaderboard.">
  <meta name="twitter:image" content="https://yetanothersnake.dev/og-image.png">

  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.webmanifest">
</head>
<body>
  <div class="game-container">
    <div class="header">
      <svg viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"/>
      </svg>
      <h1>Snake</h1>
      <div class="header-actions">
        <button class="icon-btn" id="sound-btn" type="button" aria-label="Toggle sound"></button>
        <button class="icon-btn" id="palette-btn" type="button" aria-label="Toggle colorblind palette"></button>
        <button class="icon-btn" id="theme-btn" type="button" aria-label="Toggle theme"></button>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <span>Contributions:</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat">
        <span>Streak:</span>
        <span class="stat-value" id="streak">0</span>
      </div>
      <div class="stat">
        <span>Level:</span>
        <span class="stat-value" id="level">1</span>
      </div>
      <div class="stat">
        <span>Best:</span>
        <span class="stat-value" id="best">0</span>
      </div>
      <button class="icon-btn" id="pause-btn" type="button" aria-label="Pause" disabled></button>
    </div>

    <div class="contribution-label" id="board-label">Snake graph</div>

    <div class="canvas-wrapper">
      <canvas id="game" role="img" aria-label="Snake game board styled as a GitHub contribution graph"></canvas>

      <div class="overlay" id="overlay">
        <div class="overlay-inner">
        <div class="overlay-title" id="overlay-title">Contribution Snake</div>
        <div class="overlay-sub" id="overlay-sub">Eat commits. Grow your streak.</div>
        <div class="game-over-stats" id="over-stats" hidden></div>

        <!-- Start screen -->
        <div class="mode-buttons" id="mode-buttons">
          <button class="btn" id="btn-classic">Classic</button>
          <button class="btn btn-secondary" id="btn-daily">Daily challenge</button>
          <div class="mode-note" id="daily-note" hidden></div>
          <button class="btn btn-secondary" id="btn-graph">Play your graph</button>
          <div class="variant-row">
            <label class="variant-toggle"><input type="checkbox" id="var-wrap"> Wrap walls</label>
            <label class="variant-toggle"><input type="checkbox" id="var-chill"> Chill speed</label>
          </div>
          <div class="mode-note" id="variant-note" hidden>Variant runs are unranked (classic and graph only).</div>
          <div class="mode-note" id="mode-note" hidden></div>
        </div>
        <form class="input-row" id="user-row" hidden>
          <input id="username-input" placeholder="GitHub username" autocomplete="off"
                 spellcheck="false" maxlength="39" aria-label="GitHub username">
          <button class="btn" type="submit">Play</button>
        </form>
        <button class="linklike" id="btn-leaderboard">Leaderboard</button>
        <button class="linklike" id="btn-watch-shared" hidden>Watch again</button>
        <button class="linklike" id="btn-watch-best" hidden>Watch your best run</button>
        <button class="linklike" id="btn-stats" hidden>Stats</button>

        <!-- Stats panel -->
        <div class="stats-panel" id="stats-panel" hidden></div>
        <button class="btn btn-secondary" id="stats-back" hidden>Back</button>

        <!-- Pause -->
        <button class="btn" id="btn-resume" hidden>Resume</button>

        <!-- Game over -->
        <form class="input-row" id="submit-row" hidden>
          <input id="name-input" placeholder="Your name" autocomplete="off" maxlength="20"
                 aria-label="Name for the leaderboard">
          <button class="btn" type="submit" id="btn-submit">Submit score</button>
        </form>
        <div class="over-actions" id="over-actions" hidden>
          <button class="btn" id="btn-again">Play again</button>
          <button class="btn btn-secondary" id="btn-share">Share card</button>
          <button class="btn btn-secondary" id="btn-copy">Copy result</button>
          <button class="btn btn-secondary" id="btn-menu">Menu</button>
        </div>
        <div class="share-row" id="share-row" hidden>
          <span class="share-label">Share:</span>
          <button class="btn btn-secondary btn-icon" id="share-native" aria-label="Share…" title="Share…" hidden></button>
          <button class="btn btn-secondary btn-icon" id="share-x" aria-label="Share on X" title="Share on X"></button>
          <button class="btn btn-secondary btn-icon" id="share-bluesky" aria-label="Share on Bluesky" title="Share on Bluesky"></button>
          <button class="btn btn-secondary btn-icon" id="share-threads" aria-label="Share on Threads" title="Share on Threads"></button>
        </div>

        <!-- Leaderboard panel -->
        <div class="leaderboard-tabs" id="lb-tabs" hidden>
          <button class="btn btn-secondary" id="lb-tab-classic">Classic</button>
          <button class="btn btn-secondary" id="lb-tab-daily">Daily</button>
          <button class="btn btn-secondary" id="lb-tab-yesterday">Yesterday</button>
          <button class="btn btn-secondary" id="lb-back">Back</button>
        </div>
        <div class="leaderboard" id="leaderboard" hidden></div>
        </div>
      </div>
    </div>

    <div class="spectate-cta" id="spectate-cta" hidden>
      <button class="btn" id="btn-play-own" type="button">Play your own</button>
    </div>

    <div class="sr-only" id="a11y-status" role="status" aria-live="polite"></div>

    <div class="legend">
      <span>Less</span>
      <div class="legend-square l0"></div>
      <div class="legend-square l1"></div>
      <div class="legend-square l2"></div>
      <div class="legend-square l3"></div>
      <div class="legend-square l4"></div>
      <span>More</span>
    </div>

    <div class="controls-hint">
      <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move · <kbd>Space</kbd> to pause
    </div>

    <div class="touch-controls" id="touch-controls" hidden>
      <div class="touch-row">
        <div class="touch-btn" style="visibility:hidden"></div>
        <div class="touch-btn" data-dir="0" aria-label="Up"></div>
        <div class="touch-btn" style="visibility:hidden"></div>
      </div>
      <div class="touch-row">
        <div class="touch-btn" data-dir="3" aria-label="Left"></div>
        <div class="touch-btn" data-dir="2" aria-label="Down"></div>
        <div class="touch-btn" data-dir="1" aria-label="Right"></div>
      </div>
    </div>
  </div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
